kind: object
id: Card
title: Card
role: entity
lifecycleField: status
lifecycle:
  - suggested
  - accepted
  - archived
fields:
  - id: cardId
    type: uuid
    required: true
    description: 卡片唯一标识。
  - id: connectionId
    type: uuid
    required: true
    ref:
      kind: reference
      objectId: Connection
    description: 来源连接 ID。
  - id: content
    type: CardContent
    required: true
    ref:
      kind: composition
      objectId: CardContent
    description: 卡片正文内容，由聚合内部的值对象承载。
  - id: status
    type: CardStatus
    required: true
    ref:
      kind: enum
      objectId: CardStatus
    description: 卡片生命周期字段。
