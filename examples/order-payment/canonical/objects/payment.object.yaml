kind: object
id: Payment
title: Payment
role: aggregate
lifecycleField: paymentStatus
lifecycle:
  - pending
  - confirmed
fields:
  - id: paymentId
    type: uuid
    required: true
    description: 支付记录唯一标识。
  - id: orderId
    type: uuid
    required: true
    structure: reference
    target: Order
    description: 关联订单的唯一标识。
  - id: paidAmount
    type: decimal
    required: true
    description: 实际支付金额。
  - id: paymentStatus
    type: PaymentStatus
    required: true
    structure: enum
    target: PaymentStatus
    description: 支付生命周期字段。
relations:
  - id: settlesOrder
    kind: reference
    target: Order
    field: orderId
    description: 支付记录结算对应订单。
