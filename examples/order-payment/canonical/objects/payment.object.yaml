kind: object
id: Payment
title: Payment
role: entity
lifecycleField: paymentStatus
lifecycle:
  - pending
  - confirmed
fields:
  - id: paymentId
    type: uuid
    required: true
    description: 支付记录唯一标识。
  - id: orderId
    type: uuid
    required: true
    ref:
      kind: reference
      objectId: Order
    description: 关联订单的唯一标识。
  - id: settlement
    type: PaymentSettlement
    required: true
    ref:
      kind: composition
      objectId: PaymentSettlement
    description: 支付确认时落下来的结算细节值对象。
  - id: paidAmount
    type: decimal
    required: true
    description: 实际支付金额。
  - id: paymentStatus
    type: PaymentStatus
    required: true
    ref:
      kind: enum
      objectId: PaymentStatus
    description: 支付生命周期字段。
