version: 1
id: content-moderation
title: 内容审核到发布闭环
summary: 内容先进入审核排队，再由审核员处理，通过后进入发布阶段，拒绝则提前结束流程。
vocabulary:
  viewerDetails: ./vocabulary/viewer-detail-semantics.yaml
domain:
  objects:
    - ./objects/moderation-case.object.yaml
    - ./objects/publication.object.yaml
  commands:
    - ./commands/start-review.command.yaml
    - ./commands/approve-content.command.yaml
    - ./commands/reject-content.command.yaml
    - ./commands/publish-approved-content.command.yaml
  events:
    - ./events/moderation-review-started.event.yaml
    - ./events/content-approved.event.yaml
    - ./events/content-rejected.event.yaml
    - ./events/content-published.event.yaml
  aggregates:
    - ./aggregates/moderation-case.aggregate.yaml
    - ./aggregates/publication.aggregate.yaml
  processes:
    - ./processes/content-moderation.process.yaml
