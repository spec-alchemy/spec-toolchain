kind: object
id: ModerationCase
title: ModerationCase
role: entity
lifecycleField: moderationStatus
lifecycle:
  - queued
  - reviewing
  - approved
  - rejected
fields:
  - id: caseId
    type: uuid
    required: true
    description: 审核工单的唯一标识。
  - id: contentId
    type: uuid
    required: true
    description: 待审核内容的唯一标识。
  - id: reviewerId
    type: uuid
    required: false
    description: 当前负责审核该内容的审核员标识。
  - id: moderationStatus
    type: ModerationStatus
    required: true
    ref:
      kind: enum
      objectId: ModerationStatus
    description: 审核工单当前所处的生命周期状态。
relations:
  - id: approvedPublication
    kind: reference
    target: Publication
    cardinality: 0..1
    description: 审核工单在内容通过后会产出一条发布记录。
