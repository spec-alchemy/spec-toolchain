kind: object
id: Publication
title: Publication
role: entity
lifecycleField: publicationStatus
lifecycle:
  - pending
  - published
fields:
  - id: publicationId
    type: uuid
    required: true
    description: 发布记录的唯一标识。
  - id: moderationCaseId
    type: uuid
    required: true
    ref:
      kind: reference
      objectId: ModerationCase
    description: 产出该发布记录的审核工单标识。
  - id: contentId
    type: uuid
    required: true
    description: 即将发布的内容标识。
  - id: channel
    type: text
    required: false
    description: 内容最终发布到的渠道。
  - id: publicationStatus
    type: PublicationStatus
    required: true
    ref:
      kind: enum
      objectId: PublicationStatus
    description: 发布记录当前所处的生命周期状态。
