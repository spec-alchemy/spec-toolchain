kind: aggregate
objectId: ModerationCase
initial: queued
states:
  queued:
    on:
      startReview:
        target: reviewing
        emit:
          type: ModerationReviewStarted
          payloadFrom:
            caseId: $command.caseId
            contentId: $command.contentId
            reviewerId: $command.reviewerId
  reviewing:
    on:
      approveContent:
        target: approved
        emit:
          type: ContentApproved
          payloadFrom:
            caseId: $command.caseId
            contentId: $command.contentId
      rejectContent:
        target: rejected
        emit:
          type: ContentRejected
          payloadFrom:
            caseId: $command.caseId
            contentId: $command.contentId
            reason: $command.reason
  approved: {}
  rejected: {}
