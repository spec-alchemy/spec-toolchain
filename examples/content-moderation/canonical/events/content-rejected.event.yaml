kind: event
type: ContentRejected
source: ModerationCase
description: 内容审核被拒绝，流程在审核阶段提前结束。
payload:
  fields:
    - id: caseId
      type: uuid
      required: true
    - id: contentId
      type: uuid
      required: true
    - id: reason
      type: text
      required: true
      description: 内容被拒绝的业务原因说明。
