name: Release Dry Run

on:
  workflow_dispatch:
  workflow_call:

jobs:
  release-dry-run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Execute release dry run
        run: npm run ddd-spec:release:dry-run
