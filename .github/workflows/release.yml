name: Release

on:
  push:
    branches:
      - main
      - beta
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release-readiness:
    name: Release Readiness
    uses: ./.github/workflows/release-readiness.yml
    secrets: inherit

  release:
    name: Release Or Version Packages
    runs-on: ubuntu-latest
    needs:
      - release-readiness
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Create release pull request or publish
        id: changesets
        uses: changesets/action@v1
        with:
          createGithubReleases: true
          publish: |
            if [ "$GITHUB_REF_NAME" = "beta" ]; then
              cd packages/ddd-spec-cli && npm publish --tag beta --provenance --access public
            else
              cd packages/ddd-spec-cli && npm publish --provenance --access public
            fi
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
