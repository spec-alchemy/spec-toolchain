name: Release Readiness

on:
  workflow_dispatch:
  workflow_call:

jobs:
  release-quality-gate:
    name: Release Quality Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run release gate
        run: npm run gate:release

  release-operation-dry-run:
    name: Release Operation Dry Run
    runs-on: ubuntu-latest
    needs:
      - release-quality-gate
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Execute release dry run
        run: npm run ops:release:dry-run
