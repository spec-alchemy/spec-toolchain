name: Main CI

on:
  push:
    branches:
      - main

jobs:
  check-repo-quality:
    name: Repo Quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run repo quality checks
        run: npm run check:repo:build

  check-package-regressions:
    name: Package Regressions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run package regression checks
        run: npm run check:pkg:test

  check-app-build:
    name: App Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run app build checks
        run: npm run check:app:build

  gate-pr:
    name: PR Gate Baseline
    runs-on: ubuntu-latest
    needs:
      - check-repo-quality
      - check-package-regressions
      - check-app-build
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run aggregate PR gate
        run: npm run gate:pr

  smoke-repo-example-flow:
    name: "Repo Smoke: Example Validate"
    runs-on: ubuntu-latest
    needs:
      - gate-pr
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run maintainer repo smoke flow
        run: npm run check:repo:validate
