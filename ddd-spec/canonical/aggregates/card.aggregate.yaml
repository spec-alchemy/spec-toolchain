kind: aggregate
objectId: Card
initial: suggested
states:
  suggested:
    on:
      acceptSuggestedCard:
        target: accepted
        emit:
          type: CardAccepted
          payloadFrom:
            cardId: $command.cardId
      archiveCard:
        target: archived
        emit:
          type: CardArchived
          payloadFrom:
            cardId: $command.cardId
            reason: $command.reason
  accepted: {}
  archived: {}
